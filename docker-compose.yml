version: "3.8"

services:
  # --- Database ---
  db:
    image: postgres:15
    container_name: lume_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_DATABASE:-lume}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Backend (API) ---
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: lume_api
    restart: always
    ports:
      - "${PORT:-5000}:5000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PORT=5000
      # Database — connect to the db service by service name
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_DATABASE=${DB_DATABASE:-lume}
      # JWT
      - JWT_SECRET=${JWT_SECRET}
      # CORS — which frontend URL is allowed
      - CLIENT_URL=${CLIENT_URL:-http://localhost:3000}
      - FRONTEND_URL=${FRONTEND_URL:-}
      # Cloudflare R2 (file storage)
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME:-}
      - MINIO_PUBLIC_URL=${MINIO_PUBLIC_URL:-}
      # Email (EmailJS)
      - EMAILJS_SERVICE_ID=${EMAILJS_SERVICE_ID:-}
      - EMAILJS_TEMPLATE_ID=${EMAILJS_TEMPLATE_ID:-}
      - EMAILJS_PUBLIC_KEY=${EMAILJS_PUBLIC_KEY:-}
      - EMAILJS_PRIVATE_KEY=${EMAILJS_PRIVATE_KEY:-}
      # Mediasoup (WebRTC SFU)
      - MEDIASOUP_LISTEN_IP=${MEDIASOUP_LISTEN_IP:-0.0.0.0}
      - MEDIASOUP_ANNOUNCED_IP=${MEDIASOUP_ANNOUNCED_IP:-127.0.0.1}
    networks:
      - app-network

  # --- Frontend (Client) ---
  client:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        # Injected at build time so the React bundle knows the API URL
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:5000}
    container_name: lume_web
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  pg_data:
